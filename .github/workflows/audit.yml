name: Forwarding compliance audit

on:
  schedule:
    # Weekly on Mondays 08:00 UTC (FR3 — weekly)
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip writes and webhook"
        required: false
        default: "false"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Install GAM
        env:
          # Auth the install path so we don't share the runner's 60/hr
          # unauthenticated rate limit with every other Actions job on the
          # same IP block. The shortn install script makes an unauthenticated
          # api.github.com call to discover the latest release, which fails
          # silently under rate pressure and leaves gam uninstalled — we use
          # `gh release download` instead.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          GLIBC=$(ldd --version | head -1 | awk '{print $NF}')
          echo "Runner glibc: $GLIBC"
          cd /tmp
          gh release download --repo GAM-team/GAM \
            --pattern "*-linux-x86_64-glibc${GLIBC}.tar.xz"
          mkdir -p "$HOME/bin"
          tar xf *-linux-x86_64-glibc${GLIBC}.tar.xz -C "$HOME/bin"
          echo "$HOME/bin/gam7" >> "$GITHUB_PATH"
          "$HOME/bin/gam7/gam" version | head -3

      # WIF: mint a short-lived federated credential file. No SA private key
      # ever touches the runner. The resulting file is of type=external_account;
      # GAM7's bundled google-auth uses signJwt to do DWD without a private key.
      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: false

      - name: Restore GAM admin OAuth and write SA descriptor (signjwt mode)
        env:
          GAM_OAUTH2_JSON: ${{ secrets.GAM_OAUTH2_JSON }}
          SA_EMAIL: ${{ vars.GCP_SA_EMAIL }}
          SA_CLIENT_ID: ${{ vars.GCP_SA_CLIENT_ID }}
        run: |
          mkdir -p "$HOME/.gam"
          printf '%s' "$GAM_OAUTH2_JSON" > "$HOME/.gam/oauth2.txt"

          # oauth2service.json mirrors the shape of a real SA key file, with
          # private_key blanked and key_type=signjwt. GAM's loader expects the
          # full shape; abbreviated descriptors get treated as malformed and
          # GAM silently falls back to oauth2.txt. Per
          # https://github.com/GAM-team/GAM/wiki/Using-GAM7-with-keyless-authentication-Workload-Identity-Federation
          PROJECT_ID="${SA_EMAIL##*@}"; PROJECT_ID="${PROJECT_ID%%.iam.gserviceaccount.com}"
          SA_EMAIL_URLENC="${SA_EMAIL//@/%40}"
          cat > "$HOME/.gam/oauth2service.json" <<EOF
          {
            "type": "service_account",
            "project_id": "$PROJECT_ID",
            "private_key_id": "",
            "private_key": "",
            "client_email": "$SA_EMAIL",
            "client_id": "$SA_CLIENT_ID",
            "auth_uri": "https://accounts.google.com/o/oauth2/auth",
            "token_uri": "https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url": "https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url": "https://www.googleapis.com/robot/v1/metadata/x509/$SA_EMAIL_URLENC",
            "universe_domain": "googleapis.com",
            "key_type": "signjwt"
          }
          EOF

      # Fail fast if DwD scopes were silently dropped/edited in the Workspace
      # Admin Console. `check serviceaccount` impersonates ADMIN_EMAIL once per
      # listed scope and reports PASS/FAIL; missing scopes here will manifest
      # as "No Client Access allowed" during the audit otherwise.
      - name: Verify SA Domain-Wide Delegation scopes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          ADMIN_EMAIL: ${{ vars.GAM_ADMIN_EMAIL }}
        run: |
          set -euxo pipefail
          #gam user "$ADMIN_EMAIL" check serviceaccount scopes \
          #   "https://www.googleapis.com/auth/admin.directory.user.readonly,https://www.googleapis.com/auth/admin.directory.group.readonly,https://www.googleapis.com/auth/admin.directory.domain.readonly,https://www.googleapis.com/auth/gmail.settings.basic"
             
      - name: Push Workspace roster to CRM                                                                     
        env: 
           GW_TOKEN: ${{ secrets.GWORKSPACE_WEBHOOK_TOKEN }} 
        run: |                                                                                                 
          gam print users fields primaryEmail,name,fullName,suspended,organizations > users.csv
          curl -sS -X POST "https://atlas-crm-sync.fly.dev/api/webhooks/gworkspace/$GW_TOKEN" \
          -H "Content-Type: text/csv" --data-binary @users.csv
      
      - name: Run audit
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          ARGS=()
          [ -n "$SHEET_ID" ] && ARGS+=(--sheet-id "$SHEET_ID")
          [ -n "$SLACK_WEBHOOK" ] && ARGS+=(--webhook "$SLACK_WEBHOOK")
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          node dist/index.js "${ARGS[@]}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forwarding-audit
          path: out/
          if-no-files-found: ignore
