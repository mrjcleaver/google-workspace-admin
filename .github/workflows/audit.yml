name: Forwarding compliance audit

on:
  schedule:
    # Weekly on Mondays 08:00 UTC (FR3 — weekly)
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Skip writes and webhook"
        required: false
        default: "false"

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build

      - name: Install GAM
        run: |
          set -eux
          bash <(curl -s -S -L https://gam-shortn.appspot.com/gam-install) -l
          echo "$HOME/bin/gam7" >> "$GITHUB_PATH"

      # WIF: mint a short-lived federated credential file. No SA private key
      # ever touches the runner. The resulting file is of type=external_account;
      # GAM7's bundled google-auth uses signJwt to do DWD without a private key.
      - id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
          create_credentials_file: true
          export_environment_variables: false

      - name: Restore GAM admin OAuth + write cfg + SA descriptor
        env:
          GAM_OAUTH2_JSON: ${{ secrets.GAM_OAUTH2_JSON }}
          SA_EMAIL: ${{ secrets.GCP_SA_EMAIL }}
          SA_CLIENT_ID: ${{ secrets.GCP_SA_CLIENT_ID }}
          WORKSPACE_DOMAIN: guelphrobotics.ca
        run: |
          mkdir -p "$HOME/.gam"
          printf '%s' "$GAM_OAUTH2_JSON" > "$HOME/.gam/oauth2.txt"

          # gam.cfg: written inline rather than from a secret — values are not
          # actually secret and the secret-based approach was fragile.
          cat > "$HOME/.gam/gam.cfg" <<EOF
          [DEFAULT]
          domain = $WORKSPACE_DOMAIN
          customer_id = my_customer
          oauth2_txt = oauth2.txt
          oauth2service_json = oauth2service.json
          EOF

          # GAM7 WIF needs two credential files:
          #   - GOOGLE_APPLICATION_CREDENTIALS -> external_account file (from gcp-auth step)
          #   - oauth2service.json -> SA descriptor in signjwt mode (no private key)
          PROJECT_ID="${SA_EMAIL##*@}"; PROJECT_ID="${PROJECT_ID%%.iam.gserviceaccount.com}"
          cat > "$HOME/.gam/oauth2service.json" <<EOF
          {
            "client_email": "$SA_EMAIL",
            "client_id": "$SA_CLIENT_ID",
            "project_id": "$PROJECT_ID",
            "token_uri": "https://oauth2.googleapis.com/token",
            "key_type": "signjwt",
            "private_key": "",
            "private_key_id": ""
          }
          EOF

      - name: Sanity-check auth
        run: gam info domain | head -5

      - name: Debug — show GAM config and SA descriptor
        run: |
          echo "=== gam.cfg ==="
          cat "$HOME/.gam/gam.cfg"
          echo
          echo "=== oauth2service.json ==="
          cat "$HOME/.gam/oauth2service.json"
          echo
          echo "=== gam version ==="
          gam version | head -10
          echo
          echo "=== gam user check serviceaccount ==="
          gam user martin.cleaver@guelphrobotics.ca check serviceaccount 2>&1 | head -30 || true

      - name: Run audit
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          ARGS=()
          [ -n "$SHEET_ID" ] && ARGS+=(--sheet-id "$SHEET_ID")
          [ -n "$SLACK_WEBHOOK" ] && ARGS+=(--webhook "$SLACK_WEBHOOK")
          [ "${{ inputs.dry_run }}" = "true" ] && ARGS+=(--dry-run)
          node dist/index.js "${ARGS[@]}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forwarding-audit
          path: out/
          if-no-files-found: ignore
